name: CI

# Explicit, not "*.md": CONTRIBUTING.md and docs/ are asserted/executed by tests (guarded by tests/test_documentation/test_ci_paths_ignore.py).
# Safe only while CI is not a required status check on main: a skipped required check never reports, blocking docs-only PRs.
on:
  push:
    branches: [ "main" ]
    paths-ignore: &docs_only
      - AGENTS.md
      - CLAUDE.md
      - CODE_OF_CONDUCT.md
      - NOTICE.md
      - README.md
      - SECURITY.md
  pull_request:
    branches: [ "main" ]
    paths-ignore: *docs_only

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        toxenv: ["-e core", "-e installed"]
        include:
          - python-version: "3.10"
            toxenv: "-e python310"
          - python-version: "3.11"
            toxenv: "-e python311"
          - python-version: "3.12"
            toxenv: "-e python312"
          - python-version: "3.13"
            toxenv: "-e python313"
          - python-version: "3.14"
            toxenv: "-e python314"
          - python-version: "3.12"
            toxenv: "-e nopyarrow"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv tool install tox --with tox-uv
    - name: Run tox ${{ matrix.toxenv }}
      env:
        PYTEST_WORKERS: 2
      run: tox ${{ matrix.toxenv }}
      # 3 minutes started killing green full-tox legs once #722 grew the suite past 6600 tests.
      timeout-minutes: 5

  notebooks:
    # Runs the marimo example notebooks; slower than the unit-test matrix.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv tool install tox --with tox-uv
    - name: Run notebooks
      env:
        PYTEST_WORKERS: 2
      run: tox -e notebooks
      timeout-minutes: 10

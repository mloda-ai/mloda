name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        toxenv: ["-e core", "-e installed"]
        include:
          - python-version: "3.10"
            toxenv: "-e python310"
          - python-version: "3.11"
            toxenv: "-e python311"
          - python-version: "3.12"
            toxenv: "-e python312"
          - python-version: "3.13"
            toxenv: "-e python313"

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        python -m pip install uv
        uv tool install tox --with tox-uv
    - name: Run tox ${{ matrix.toxenv }}
      env:
        PYTEST_WORKERS: 2
      run: tox ${{ matrix.toxenv }}
      timeout-minutes: 3

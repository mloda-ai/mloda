[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mloda"
version = "0.5.3"
description = "mloda.ai: Open Data Access for ML and AI"
readme = { file = "README.md", content-type = "text/markdown" }
license = { text = "Apache-2.0" }
authors = [
    { name = "Tom Kaltofen", email = "info@mloda.ai" }
]
dependencies = [
    "pyarrow"
]

requires-python = ">=3.10,<3.14"
classifiers = [
    "Programming Language :: Python :: 3"
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-xdist",
    "pytest-order",
    "pytest-timeout",
    "ruff",
    "mypy",
    "mktestdocs",
    "pandera",
    "pyarrow",
    "testbook",
    "ipykernel",
    "bandit",
    "types-PyYAML",
    "types-requests",
    "types-toml",
    "scikit-learn",
    "pip-audit<2.11.0",
]
pandas = ["pandas"]
polars = ["polars"]
duckdb = ["duckdb"]
iceberg = ["pyiceberg"]
spark = ["pyspark"]
otel = [
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation",
    "opentelemetry-instrumentation-logging",
    "opentelemetry-instrumentation-requests",
]
sklearn = [
    "scikit-learn>=1.0.0",
    "joblib>=1.0.0",
]
text_cleaning = ["nltk>=3.8"]
docs = [
    "mkdocs",
    "mkdocs-jupyter",
    "notebook",
    "mermaid-py",
]
licence = ["pip-licenses-cli"]
all = [
    "pytest",
    "pytest-xdist",
    "pytest-order",
    "pytest-timeout",
    "ruff",
    "mypy",
    "mktestdocs",
    "pandera",
    "pyarrow",
    "testbook",
    "ipykernel",
    "bandit",
    "types-PyYAML",
    "types-requests",
    "types-toml",
    "pip-audit<2.11.0",
    "pandas",
    "polars",
    "duckdb",
    "pyiceberg",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation",
    "opentelemetry-instrumentation-logging",
    "opentelemetry-instrumentation-requests",
    "scikit-learn>=1.0.0",
    "joblib>=1.0.0",
    "nltk>=3.8",
    "mkdocs",
    "mkdocs-jupyter",
    "notebook",
    "mermaid-py",
    "pip-licenses-cli",
]

[project.urls]
"Bug Tracker" = "https://github.com/mloda-ai/mloda/issues"
"Documentation" = "https://mloda-ai.github.io/mloda/"
"Source Code" = "https://github.com/mloda-ai/mloda"
"PyPI" = "https://pypi.org/project/mloda/"
"Homepage" = "https://mloda.ai"

[tool.setuptools.packages.find]
where = ["."]
include = ["mloda.*", "mloda_plugins*"]
exclude = ["mloda.community*", "mloda.enterprise*", "mloda.registry*", "mloda.testing*"]
namespaces = true

[tool.setuptools]
include-package-data = true

[tool.bandit]
exclude_dirs = [
    "venv",
    ".venv",
    "migrations",
    "__pycache__",
    "build",
    "dist",
    ".devcontainer",
    ".tox",
    ".vscode",
    "attribution",
    "*.egg-info",
    "site-packages"
]
skips = [
    "B101", # Use of assert detected. The enclosed code will be removed when compiling to optimised byte code.
    "B104"  # Possible binding to all interfaces detected.
]

[tool.mypy]
explicit_package_bases = true
namespace_packages = true

[[tool.mypy.overrides]]
module = "mloda_plugins.compute_framework.base_implementations.iceberg.iceberg_filter_engine"
disable_error_code = ["misc", "call-arg", "arg-type"]

[tool.ruff]
line-length = 120

[project.scripts]
mloda = "mloda_plugins.feature_group.experimental.llm.cli:main"
